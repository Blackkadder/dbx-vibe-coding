name: CI - Streamlit App

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Test Streamlit App
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('frontend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r frontend/requirements.txt
        pip install pytest pytest-cov flake8 black isort safety

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 frontend --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings
        flake8 frontend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        black --check --diff frontend/

    - name: Import sort check with isort
      run: |
        isort --check-only --diff frontend/

    - name: Security check with safety
      run: |
        safety check

    - name: Run pytest tests
      run: |
        cd frontend && python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        file: ./frontend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  streamlit-health-check:
    name: Streamlit Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r frontend/requirements.txt

    - name: Start Streamlit app
      run: |
        cd frontend
        streamlit run app.py --server.headless true --server.port 8501 &
        sleep 10

    - name: Health check
      run: |
        curl -f http://localhost:8501/healthz || curl -f http://localhost:8501 || exit 1

    - name: Stop Streamlit app
      run: |
        pkill -f streamlit || true